<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* General Reset and Box-Sizing */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #fafbfc 0%, #f0f2f5 100%);
            color: #2c3e50;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        /* Background Pattern */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(44,62,80,0.02)" stroke-width="1"/></pattern></defs><rect width="100" height="100" fill="url(%23grid)"/></svg>');
            opacity: 0.5;
            pointer-events: none;
        }

        /* Login Container */
        .login-container {
            background: white;
            padding: 48px 40px;
            border-radius: 16px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08), 0 8px 32px rgba(0, 0, 0, 0.06);
            width: 100%;
            max-width: 440px;
            text-align: center;
            position: relative;
            z-index: 1;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* Header Section */
        .login-header {
            margin-bottom: 40px;
        }

        .login-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 24px;
            background: linear-gradient(135deg, #2c3e50, #34495e);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: white;
        }

        h2 {
            font-size: 28px;
            margin-bottom: 8px;
            color: #2c3e50;
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        .login-subtitle {
            font-size: 14px;
            color: #6c757d;
            margin-bottom: 8px;
        }

        .header-divider {
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, #3498db, #2ecc71);
            margin: 0 auto;
            border-radius: 2px;
        }

        /* Form Styling */
        form {
            display: flex;
            flex-direction: column;
            gap: 24px;
            text-align: left;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 14px;
            font-weight: 500;
            color: #374151;
            margin-bottom: 4px;
        }

        input {
            padding: 14px 16px;
            font-size: 16px;
            border-radius: 8px;
            border: 1px solid #d1d5db;
            outline: none;
            transition: all 0.2s ease;
            background-color: #fafbfc;
            font-family: inherit;
        }

        input:focus {
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
            background-color: white;
        }

        input:hover {
            border-color: #9ca3af;
        }

        /* Button Styling */
        .login-button {
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            color: white;
            padding: 16px 0;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px rgba(44, 62, 80, 0.2);
            position: relative;
            overflow: hidden;
            margin-top: 8px;
        }

        .login-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .login-button:hover::before {
            left: 100%;
        }

        .login-button:hover {
            background: linear-gradient(135deg, #34495e 0%, #2c3e50 100%);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(44, 62, 80, 0.3);
        }

        .login-button:active {
            transform: translateY(0);
        }

        .login-button:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.3);
        }



        /* Security Badge */
        .security-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 24px;
            font-size: 12px;
            color: #6c757d;
        }

        .security-badge::before {
            content: '🔒';
            font-size: 14px;
        }

        /* Footer Link */
        .footer-link {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid #e5e7eb;
        }

        .footer-link a {
            color: #3498db;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        .footer-link a:hover {
            color: #2c3e50;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .login-container {
                padding: 32px 24px;
                margin: 16px;
            }

            h2 {
                font-size: 24px;
            }

            .login-icon {
                width: 56px;
                height: 56px;
                font-size: 24px;
            }

            input {
                padding: 12px 14px;
                font-size: 16px;
            }

            .login-button {
                padding: 14px 0;
                font-size: 16px;
            }
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 24px 20px;
            }

            h2 {
                font-size: 22px;
            }

            input {
                padding: 12px;
                font-size: 16px;
            }
        }

        /* Accessibility improvements */
        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        /* Focus indicators for keyboard navigation */
        input:focus-visible,
        .login-button:focus-visible {
            outline: 2px solid #3498db;
            outline-offset: 2px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="login-icon">🔐</div>
            <h2>Admin Login</h2>
            <p class="login-subtitle">Secure access to the grievance management system</p>
            <div class="header-divider"></div>
        </div>
        
        <!-- Form for admin login -->
        <form action="/login" method="POST">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required placeholder="Enter your username">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Enter your password">
            </div>

            <button type="submit" class="login-button">Sign In</button>
        </form>



        <div class="security-badge">
            Secured with enterprise-grade encryption
        </div>

        <div class="footer-link">
            <a href="/">← Back to Home</a>
        </div>
    </div>
</body>
</html>
